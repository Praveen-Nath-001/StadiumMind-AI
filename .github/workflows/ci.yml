name: StadiumMind AI CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint-and-test-backend:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: stadiummind_test
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install Dependencies
        run: |
          cd backend
          npm ci

      - name: Generate Prisma Client
        run: |
          cd backend
          npx prisma generate
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/stadiummind_test"

      - name: Run Jest Tests
        run: |
          cd backend
          npm run test
        env:
          DATABASE_URL: "mysql://root:root@localhost:3306/stadiummind_test"
          REDIS_URL: "redis://localhost:6379"
          JWT_ACCESS_SECRET: "ci-secret-key-for-stadiummind-access"
          JWT_REFRESH_SECRET: "ci-secret-key-for-stadiummind-refresh"
          GEMINI_API_KEY: "AIzaSyDummyKey_CI"

  lint-and-build-frontend:
    name: Frontend Lint & Production Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontend
          npm install --legacy-peer-deps

      - name: Next.js Compile and Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5000/api"

  docker-build:
    name: Dockerize Application Stack
    runs-on: ubuntu-latest
    needs: [lint-and-test-backend, lint-and-build-frontend]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build Backend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: stadiummind-backend:latest

      - name: Build Frontend Docker Image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: stadiummind-frontend:latest
