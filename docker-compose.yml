version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stadiummind-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stadiummind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d stadiummind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: stadiummind-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stadiummind-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/stadiummind?schema=public"
      REDIS_URL: "redis://redis:6379"
      JWT_ACCESS_SECRET: "super-secret-access-token-key-2026-fifa"
      JWT_REFRESH_SECRET: "super-secret-refresh-token-key-2026-fifa"
      JWT_ACCESS_EXPIRY: "15m"
      JWT_REFRESH_EXPIRY: "7d"
      PORT: 5000
      GEMINI_API_KEY: "${GEMINI_API_KEY:-AIzaSyDummyKey_PleaseReplaceWithRealGeminiKey}"
      NODE_ENV: "production"
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stadiummind-frontend
    restart: always
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:5000"
    ports:
      - "3000:3000"

  nginx:
    image: nginx:alpine
    container_name: stadiummind-nginx
    restart: always
    depends_on:
      - backend
      - frontend
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  pgdata:
  redisdata:
